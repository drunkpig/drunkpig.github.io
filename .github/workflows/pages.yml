name: Build and Deploy Pages

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Restore previous build cache
        uses: actions/cache/restore@v4
        with:
          path: dist
          key: pages-dist-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            pages-dist-${{ github.ref_name }}-

      - name: Detect changed files
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          else
            base=""
            head="${{ github.sha }}"
          fi

          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            : > changed.txt
            exit 0
          fi

          git diff --name-only "$base" "$head" > changed.txt

      - name: Install mdwiki
        run: |
          python -m pip install --upgrade pip
          pip install "mdwiki==0.3.6"
          mdwiki_exec --version

      - name: Build site
        shell: bash
        run: |
          if [ -d dist ] && [ -f dist/.mdwiki-build.json ] && [ -s changed.txt ]; then
            mdwiki_exec --changed-files changed.txt ./post ./dist
          else
            mdwiki_exec ./post ./dist
          fi
          if [ -f CNAME ]; then cp CNAME dist/CNAME; elif [ -f post/CNAME ]; then cp post/CNAME dist/CNAME; fi
          touch dist/.nojekyll

      - name: Save build cache
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/cache/save@v4
        with:
          path: dist
          key: pages-dist-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
